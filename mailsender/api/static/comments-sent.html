<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Comentarios enviados</title>
		<link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
	</head>
	<body>
		<main class="shell">
			<section class="panel" aria-labelledby="comments-title">
				<img src="https://static.wixstatic.com/media/fc7a5e_230716f41dfe4dcea309a9f55ecea818~mv2.png/v1/fill/w_520,h_106,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/test2.png" alt="Centro de Microdatos" style="max-width: 220px; height: auto; margin-bottom: 16px">
				<div class="detail">Comentarios enviados</div>
				<h1 id="comments-title">Gracias por tu opinión.</h1>
				<p>
					Leemos cada mensaje. Tu feedback nos ayuda a mejorar la experiencia.
				</p>
				<div class="actions">
					<a class="button-link primary" href="https://www.microdatos.cl">Volver</a>
				</div>
			</section>

			<aside class="side" aria-label="Qué sigue">
				<h2>Qué sigue</h2>
				<div class="list">
					<span><i class="dot"></i>Tu comentario quedó registrado.</span>
					<!-- <span><i class="dot"></i>Si cambias de opinión, puedes reactivar la suscripción.</span> -->
					<!-- <span><i class="dot"></i>Seguimos cuidando tu privacidad.</span> -->
				</div>
			</aside>
		</main>
	</body>
</html>
